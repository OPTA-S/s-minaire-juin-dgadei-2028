<style>
:root{
  --navy:#002D69;
  --navy-d:#001A3F;

*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:"Inter",system-ui,sans-serif;color:var(--grey);background:var(--cream);-webkit-font-smoothing:antialiased;min-height:100vh}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:0}

/* ============================================================
   JOUEUR — Animal & Quiz
============================================================ */
.play-wrap{max-width:580px;margin:0 auto;padding:24px 18px 60px}
.play-hero{text-align:center;margin-bottom:18px}
.play-hero h1{
  margin:8px 0 4px;color:var(--navy);
  font-family:"Playfair Display",serif;font-style:italic;
  font-size:28px;font-weight:700
}
.play-hero .sub{color:var(--orange);font-size:14px;font-weight:600;margin-bottom:8px}

.section-title{
  color:var(--navy);font-weight:700;font-size:16px;
  margin:18px 0 12px;text-align:center
}

/* Grille animaux */
.animal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.animal{
  background:#fff;border:2px solid #EBE0CB;border-radius:14px;
  padding:12px 4px 10px;text-align:center;cursor:pointer;
  transition:transform .15s, border-color .15s, background .15s, box-shadow .15s;
  -webkit-tap-highlight-color:transparent
}
.animal:hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(0,45,105,.1)}
.animal.sel{
  border-color:var(--orange);
  background:linear-gradient(135deg,#FFEBD9 0%,#FFD8B3 100%);
  transform:scale(1.05);box-shadow:0 8px 20px rgba(255,102,0,.3)
}
.animal.taken{
  opacity:.30;cursor:not-allowed;background:#F4ECD9;
  position:relative;pointer-events:none
}
.animal.taken::after{
  content:"✕";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:28px;color:var(--red);font-weight:800
}
.animal .emoji{font-size:34px;display:block;line-height:1}
.animal .name{font-size:10px;color:var(--navy);font-weight:600;margin-top:2px}
.player-name{
  width:100%;border:2px solid #EBE0CB;border-radius:14px;padding:12px 14px;
  font-size:16px;color:var(--navy);background:#fff;outline:none;margin-top:10px;
  font-family:inherit;text-align:center;font-weight:600
}
.player-name:focus{border-color:var(--orange)}

/* Waiting */
.waiting{
  text-align:center;padding:40px 24px;background:#fff;border-radius:18px;
  border:3px dashed var(--orange);margin-top:18px
}
.waiting .big{font-size:64px;display:block;margin-bottom:14px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.waiting h2{color:var(--navy);font-family:"Playfair Display",serif;font-style:italic;font-size:24px;margin:0 0 8px}
.waiting p{margin:0;color:var(--grey);line-height:1.5}

/* Question (joueur) */
.q-card{
  background:#fff;border-radius:18px;padding:22px 20px;
  box-shadow:0 8px 22px rgba(0,45,105,.12);margin-bottom:14px
}
.q-card .q-idx{
  color:var(--orange);font-weight:800;font-size:13px;letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:6px
}
.q-card .q-text{color:var(--navy);font-size:19px;font-weight:700;line-height:1.35}
.q-card .chrono{
  margin-top:12px;height:8px;background:#F4ECD9;border-radius:4px;overflow:hidden
}
.q-card .chrono-fill{
  height:100%;background:linear-gradient(90deg, var(--green) 0%, var(--orange) 60%, var(--red) 100%);

}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}

}
.choice:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,45,105,.1)}
.choice.picked{
  border-color:var(--orange);
  background:linear-gradient(135deg,#FFEBD9 0%,#FFD8B3 100%);
  color:var(--orange);transform:scale(.98)
}
.choice.locked{opacity:.5;cursor:not-allowed}

.answer-feedback{
  background:#fff;border-radius:18px;padding:28px 20px;text-align:center;
  box-shadow:0 8px 22px rgba(0,45,105,.12)
}
.answer-feedback .verdict{font-size:54px;display:block;margin-bottom:8px}
.answer-feedback h3{color:var(--navy);font-family:"Playfair Display",serif;font-style:italic;font-size:22px;margin:0 0 8px}
.answer-feedback .score-line{font-size:20px;color:var(--orange);font-weight:800;margin:8px 0}
.answer-feedback .info{color:var(--grey);font-size:14px;margin:8px 0;line-height:1.4}

.ctrl-bar{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);

  background:rgba(0,45,105,.92);color:#fff;border-radius:30px;
  padding:8px 14px;
  display:flex;gap:10px;align-items:center;
  box-shadow:0 12px 30px rgba(0,45,105,.35);
  max-width:90vw;flex-wrap:wrap;justify-content:center;
  backdrop-filter:blur(10px)
}
.ctrl-bar .ctrl-msg{
  color:#FFE8C8;font-size:13px;font-style:italic;padding:0 6px;
  max-width:280px;line-height:1.3
}
.ctrl-bar .ctrl-btn{
  background:var(--orange);color:#fff;
  padding:12px 22px;border-radius:24px;font-size:14px;font-weight:700;letter-spacing:.3px;
  cursor:pointer;transition:transform .1s, box-shadow .15s, opacity .2s, background .15s
}
.ctrl-bar .ctrl-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 14px rgba(255,102,0,.4)}
.ctrl-bar .ctrl-btn:disabled{opacity:.4;cursor:not-allowed}
.ctrl-bar .ctrl-btn.secondary{background:transparent;border:1.5px solid #fff;color:#fff}
.ctrl-bar .ctrl-btn.small{padding:8px 12px;font-size:14px}
.ctrl-bar .ctrl-btn.danger{background:var(--red);font-size:11px;padding:8px 14px}
.ctrl-bar.hidden{display:none}

   ANIMATEUR
============================================================ */

.btn{
  display:inline-block;padding:14px 26px;border-radius:30px;

.current-q{

.current-q .label{color:var(--orange);font-size:12px;font-weight:800;letter-spacing:1.5px}

  display:flex;align-items:center;gap:14px;
  background:#fff;border:2px solid #EBE0CB;border-radius:14px;
  padding:12px 18px;position:relative;
  transition:transform .2s, box-shadow .2s
}

  box-shadow:0 8px 22px rgba(31,138,76,.25);
  background:linear-gradient(135deg, #E8F5EC 0%, #F4FAF6 100%);
  transform:scale(1.02)
}

  content:"";position:absolute;top:-3px;left:-3px;right:-3px;bottom:-3px;
  border:4px solid var(--green);border-radius:17px;
  pointer-events:none;
  animation:correctPulse 1.5s ease-out infinite
}

  0%{opacity:1;transform:scale(1)}
  50%{opacity:.5;transform:scale(1.015)}
  100%{opacity:1;transform:scale(1)}

<script>
// ============================================================
// PERSISTANCE LOCALE PLAYER
// ============================================================
const PLAYER_ID = (() => {
  let id = localStorage.getItem("quiz.playerId");
  if (!id) { id = "p" + Math.random().toString(36).slice(2, 10); localStorage.setItem("quiz.playerId", id); }
  return id;
})();

// ============================================================
// FIREBASE REST helpers (sans SDK)
// ============================================================
async function fbGet(path) {
  const r = await fetch(FB_URL + path + ".json?_=" + Date.now());
  return r.ok ? r.json() : null;
}
async function fbPut(path, data) {
  const r = await fetch(FB_URL + path + ".json", {
    method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify(data)
  });
  return r.ok;
}
async function fbPatch(path, data) {
  const r = await fetch(FB_URL + path + ".json", {
    method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify(data)
  });
  return r.ok;
}
async function fbDelete(path) {
  const r = await fetch(FB_URL + path + ".json", { method: "DELETE" });
  return r.ok;
}

// ============================================================
// ROUTAGE — supporte ?play=1 (préféré, scannable par iPhone) ET #play (legacy)
// ============================================================
const _params = new URLSearchParams(location.search);
const route = (_params.get("play") === "1" || location.hash.replace("#","") === "play")
  ? "play" : "";

if (route === "play") {
  document.getElementById("play-view").classList.remove("hidden");
  initPlayer();
} else {
  // Par défaut : vue projection unifiée (Séverine voit les contrôles intégrés)
  document.getElementById("proj-view").classList.remove("hidden");
  initProjection();
}

// ============================================================
// AUDIO — bips countdown + applaudissements synthétiques
// ============================================================
let audioCtx = null;
let audioUnlocked = false;
let lastBeepSec = -1;
let lastAppraudissementsAt = 0;

function ensureAudio() {
  if (audioCtx) return audioCtx;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) { return null; }
  return audioCtx;
}

function unlockAudio() {
  const ctx = ensureAudio();
  if (!ctx) return;
  if (ctx.state === "suspended") ctx.resume();
  // Petit son test inaudible pour débloquer
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  gain.gain.value = 0.001;
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = 100;
  osc.start();
  osc.stop(ctx.currentTime + 0.05);
  audioUnlocked = true;
}

function playBeep(highPitch = false) {
  const ctx = ensureAudio();
  if (!ctx || !audioUnlocked) return;
  const t0 = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.value = highPitch ? 1320 : 880;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(0.18, t0 + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.18);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + 0.2);
}

function playFinalBuzz() {
  const ctx = ensureAudio();
  if (!ctx || !audioUnlocked) return;
  const t0 = ctx.currentTime;
  // Buzz grave 2 fois
  for (let i = 0; i < 2; i++){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sawtooth";
    osc.frequency.value = 180;
    gain.gain.setValueAtTime(0, t0 + i*0.25);
    gain.gain.linearRampToValueAtTime(0.22, t0 + i*0.25 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + i*0.25 + 0.22);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0 + i*0.25);
    osc.stop(t0 + i*0.25 + 0.25);
  }
}

function playPodiumBips() {
  const ctx = ensureAudio();
  if (!ctx || !audioUnlocked) return;
  const now = Date.now();
  if (now - lastAppraudissementsAt < 1500) return;
  lastAppraudissementsAt = now;
  const t0 = ctx.currentTime;
  // 3 bips clairs façon "ding-ding-DING" qui montent
  const freqs = [880, 1108.73, 1318.51]; // La5 - Do#6 - Mi6 (accord majeur)
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = f;
    const start = t0 + i * 0.22;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(i === 2 ? 0.28 : 0.20, start + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, start + (i === 2 ? 0.45 : 0.25));
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(start);
    osc.stop(start + (i === 2 ? 0.5 : 0.3));
  });
}
// Compat : alias pour les anciens appels
const playApplause = playPodiumBips;

// Débloquer l'audio sur n'importe quelle interaction
document.addEventListener("click", unlockAudio, { once: false });
document.addEventListener("keydown", unlockAudio, { once: false });

// ============================================================
// UTILITAIRES SCORE
// ============================================================
function computeScore(answerCorrect, timeMs) {
  if (!answerCorrect) return 0;
  // 1000 pts si répond instantané, décote linéaire jusqu'à 200 pts à 25 s
  const ratio = Math.max(0, 1 - timeMs / QUESTION_DURATION);
  return Math.round(200 + 800 * ratio);
}
function topN(arr, n) {
  return arr.slice().sort((a,b) => b.score - a.score).slice(0, n);
}

// ============================================================
// QR via API serveur (api.qrserver.com)
// Noir pur (iPhone exige), marge de silence, ECC élevé pour robustesse
// ============================================================
function loadQR(canvasId, url) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const size = canvasId === "anim-qr" ? 260 : 240;
  const img = document.createElement("img");
  img.width = size;
  img.height = size;
  img.alt = "QR code participant";
  img.style.borderRadius = "6px";
  img.style.display = "block";
  // Noir pur (000000) + marge 2 + ECC Q (correction d'erreur élevée) → iPhone-friendly
  const primary = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&ecc=Q&margin=2&color=000000&bgcolor=FFFFFF&data=${encodeURIComponent(url)}`;
  const fallback = `https://chart.googleapis.com/chart?cht=qr&chs=${size}x${size}&chl=${encodeURIComponent(url)}&chld=Q|2`;
  img.onerror = () => { img.onerror = null; img.src = fallback; };
  img.src = primary;
  canvas.parentNode.replaceChild(img, canvas);
}

// ============================================================
// CONTRÔLES SÉVERINE (barre intégrée dans la projection)
// ============================================================
async function resetSession() {
  if (!confirm("Effacer toute la session (joueurs, réponses, scores) ?")) return;
  await fbDelete(BASE);
  location.reload();
}

// Retour au lobby (garde les joueurs, efface les réponses + state)
async function backToLobby() {
  if (!confirm("Revenir à l'accueil ? Les joueurs restent connectés, les réponses sont effacées.")) return;
  await fbDelete(BASE + "/answers");
  await fbPut(BASE + "/state", { phase: "lobby" });
  projLastRender = "";
  lastBeepSec = -1;
}

// Question précédente
async function prevQuestion(currentIdx) {
  if (currentIdx <= 0) return;
  await fbDelete(BASE + `/answers/q${currentIdx - 1}`);
  await launchQuestion(currentIdx - 1);
}

// Relancer la question actuelle (efface les réponses)
async function relaunchQuestion(idx) {
  if (!confirm("Relancer cette question ? Les réponses déjà reçues seront effacées.")) return;
  await fbDelete(BASE + `/answers/q${idx}`);
  await launchQuestion(idx);
}

// Helper protégé : attache un listener sans planter si l'élément n'existe pas
function on(id, handler) {
  const el = document.getElementById(id);
  if (el && !el.disabled) el.addEventListener("click", handler);
}

function renderControlBar(state, pcount, ansCount) {
  const bar = document.getElementById("ctrl-bar");
  if (!bar) return;
  bar.classList.remove("hidden");

  // Boutons nav avec id systématique (disabled ne supprime pas l'id)
  const navHome = `<button class="ctrl-btn secondary small" id="cb-home" title="Revenir à l'accueil">🏠</button>`;
  const navPrev = `<button class="ctrl-btn secondary small" id="cb-prev" ${(state.q_idx||0) > 0 ? '' : 'disabled'} title="Question précédente">◀</button>`;

  try {
    if (state.phase === "lobby") {
      if (pcount === 0) {
        bar.innerHTML = `
          <span class="ctrl-msg">En attente du 1er joueur…</span>
          <button class="ctrl-btn" id="cb-start" disabled>▶ Lancer la 1ère question</button>
          <button class="ctrl-btn danger" id="cb-reset">RAZ</button>`;
      } else {
        bar.innerHTML = `
          <span class="ctrl-msg">${pcount} joueur${pcount>1?'s':''} prêt${pcount>1?'s':''}</span>
          <button class="ctrl-btn" id="cb-start">▶ Lancer la 1ère question</button>
          <button class="ctrl-btn danger" id="cb-reset">RAZ</button>`;
      }
      on("cb-start", () => launchQuestion(0));
      on("cb-reset", resetSession);
    }
    else if (state.phase === "question") {
      bar.innerHTML = `
        ${navHome}
        ${navPrev}
        <span class="ctrl-msg">Q${state.q_idx + 1}/${QUESTIONS.length} · ${ansCount}/${pcount} ont répondu</span>
        <button class="ctrl-btn secondary small" id="cb-relaunch" title="Relancer cette question">🔄</button>
        <button class="ctrl-btn" id="cb-close">Clore et afficher le podium</button>`;
      on("cb-home", backToLobby);
      on("cb-prev", () => prevQuestion(state.q_idx));
      on("cb-relaunch", () => relaunchQuestion(state.q_idx));
      on("cb-close", closeQuestion);
    }
    else if (state.phase === "result") {
      const isLast = state.q_idx >= QUESTIONS.length - 1;
      bar.innerHTML = `
        ${navHome}
        ${navPrev}
        <button class="ctrl-btn secondary small" id="cb-relaunch" title="Relancer cette question">🔄</button>
        <span class="ctrl-msg">Q${state.q_idx+1}/${QUESTIONS.length} terminée</span>
        ${isLast
          ? `<button class="ctrl-btn" id="cb-next">🏆 Podium FINAL</button>`
          : `<button class="ctrl-btn" id="cb-next">Suivante ▶ (${state.q_idx + 2}/${QUESTIONS.length})</button>`}`;
      on("cb-home", backToLobby);
      on("cb-prev", () => prevQuestion(state.q_idx));
      on("cb-relaunch", () => relaunchQuestion(state.q_idx));
      on("cb-next", async () => {
        if (isLast) await fbPut(BASE + "/state", { phase: "end", q_idx: state.q_idx });
        else await launchQuestion(state.q_idx + 1);
      });
    }
    else if (state.phase === "end") {
      bar.innerHTML = `
        ${navHome}
        <span class="ctrl-msg">🎉 Quiz terminé</span>
        <button class="ctrl-btn" id="cb-back">↩ Revoir le podium par question</button>
        <button class="ctrl-btn danger" id="cb-reset">Nouvelle session</button>`;
      on("cb-home", backToLobby);
      on("cb-back", async () => {
        await fbPut(BASE + "/state", { phase: "result", q_idx: state.q_idx });
      });
      on("cb-reset", resetSession);
    }
  } catch(e) {
    console.error("[quiz] renderControlBar error", e);
  }
}

// ============================================================
// LOGIQUE QUESTION : countdown sonore + auto-close (avant : dans refreshAnim, maintenant : dans renderProj)
// ============================================================
function tickQuestionSounds(state) {
  if (state.phase !== "question") return;
  const elapsed = Date.now() - state.q_started_at;
  const remaining = Math.max(0, QUESTION_DURATION - elapsed);
  const remSec = Math.ceil(remaining / 1000);
  if (remSec > 0 && remSec <= 10 && remSec !== lastBeepSec) {
    lastBeepSec = remSec;
    playBeep(remSec <= 3);
  }
  if (remaining <= 0 && !state.auto_closing) {
    fbPatch(BASE + "/state", { auto_closing: true }).then(() => {
      playFinalBuzz();
      setTimeout(() => closeQuestion(), 400);
    });
  }
}

// Stub pour ne pas casser : refreshAnim n'est plus utilisé
async function refreshAnim() {
  const all = await fbGet(BASE) || {};
  const players = all.players || {};
  const state = all.state || { phase: "lobby" };
  const answers = all.answers || {};

  const pcount = Object.keys(players).length;
  document.getElementById("anim-pcount").textContent = pcount;

  const plist = document.getElementById("anim-players");
  plist.innerHTML = "";
  Object.values(players).forEach(p => {
    const el = document.createElement("div"); el.className = "p-chip";
    el.innerHTML = `<span class="e">${p.animal}</span> ${escapeHtml(p.name || "")}`;
    plist.appendChild(el);
  });

  const phaseDiv = document.getElementById("anim-phase-content");
  const status = document.getElementById("anim-status");

  if (state.phase === "lobby") {
    if (pcount === 0) {
      status.textContent = `Aucun joueur n'a encore scanné le QR. Le bouton « Lancer » s'activera dès le 1er joueur.`;
    } else {
      status.textContent = `${pcount} joueur${pcount>1?'s':''} prêt${pcount>1?'s':''}. Tu peux lancer la 1ère question.`;
    }
    phaseDiv.innerHTML = `<div class="btns-row"><button class="btn btn-primary" id="start-btn-2" ${pcount === 0 ? 'disabled' : ''}>▶ Lancer la 1ère question</button></div>`;
    document.getElementById("start-btn-2").addEventListener("click", () => launchQuestion(0));
  }
  else if (state.phase === "question") {
    const q = QUESTIONS[state.q_idx];
    const ans = answers[`q${state.q_idx}`] || {};
    const ansCount = Object.keys(ans).length;
    const elapsed = Date.now() - state.q_started_at;
    const remaining = Math.max(0, QUESTION_DURATION - elapsed);
    const remSec = Math.ceil(remaining / 1000);
    status.textContent = `Question ${state.q_idx + 1} / ${QUESTIONS.length} en cours · ${ansCount}/${pcount} ont répondu`;
    phaseDiv.innerHTML = `
      <div class="current-q">
        <div class="label">QUESTION ${state.q_idx + 1}</div>
        <div class="text">${escapeHtml(q.q)}</div>
        <div class="answers-count">⏱ ${remSec}s restantes · ${ansCount}/${pcount} réponses reçues</div>
      </div>
      <div class="btns-row">
        <button class="btn btn-primary" id="next-btn">Clore la question et afficher le podium</button>
      </div>
    `;
    document.getElementById("next-btn").addEventListener("click", () => closeQuestion());
    // Beep countdown les 10 dernières secondes (un seul écran joue les bips : l'animateur)
    if (remSec > 0 && remSec <= 10 && remSec !== lastBeepSec) {
      lastBeepSec = remSec;
      playBeep(remSec <= 3);
    }
    // Auto-close à 0 secondes
    if (remaining <= 0 && !state.auto_closing) {
      fbPatch(BASE + "/state", { auto_closing: true }).then(() => {
        playFinalBuzz();
        setTimeout(() => closeQuestion(), 400);
      });
    }
  }
  else if (state.phase === "result") {
    status.textContent = `Podium affiché — clique pour la suite`;
    const isLast = state.q_idx >= QUESTIONS.length - 1;
    phaseDiv.innerHTML = `
      <div class="current-q">
        <div class="label">QUESTION ${state.q_idx + 1}</div>
        <div class="text">${escapeHtml(QUESTIONS[state.q_idx].q)}</div>
        <div class="answers-count">Bonne réponse : <b style="color:var(--green)">${escapeHtml(QUESTIONS[state.q_idx].opts[QUESTIONS[state.q_idx].correct])}</b></div>
      </div>
      <div class="btns-row">
        ${isLast
          ? `<button class="btn btn-primary" id="next-btn">Voir le podium FINAL</button>`
          : `<button class="btn btn-primary" id="next-btn">Question suivante (${state.q_idx + 2}/${QUESTIONS.length})</button>`}
      </div>
    `;
    document.getElementById("next-btn").addEventListener("click", async () => {
      if (isLast) await fbPut(BASE + "/state", { phase: "end", q_idx: state.q_idx });
      else await launchQuestion(state.q_idx + 1);
    });
  }
  else if (state.phase === "end") {
    status.textContent = `Quiz terminé ! Le podium final est sur la projection.`;
    phaseDiv.innerHTML = `<div style="padding:20px;text-align:center;color:var(--navy);font-size:18px;font-weight:700">🎉 Quiz terminé. Bravo à tous !</div>`;
  }
}

async function launchQuestion(idx) {
  lastBeepSec = -1;
  projLastRender = "";
  await fbPut(BASE + "/state", {
    phase: "question",
    q_idx: idx,
    q_started_at: Date.now(),
    auto_closing: false
  });
}

async function closeQuestion() {
  const state = await fbGet(BASE + "/state");
  if (!state) return;
  await fbPatch(BASE + "/state", { phase: "result" });
}

// ============================================================
// JOUEUR
// ============================================================
async function initPlayer() {
  await renderPlayer();
  setInterval(renderPlayer, 1000);
}

let lastPhaseRendered = "";
let chronoTimer = null;
let myAnimal = null;
let myName = "";
let mySelectedAnimal = null;

async function renderPlayer() {
  const all = await fbGet(BASE) || {};
  const players = all.players || {};
  const state = all.state || { phase: "lobby" };
  const me = players[PLAYER_ID];
  const container = document.getElementById("play-content");

  // Animaux déjà pris par les autres joueurs
  const taken = new Set();
  Object.values(players).forEach(p => { if (p && p.animal) taken.add(p.animal); });

  // 1) Si pas encore inscrit → choix animal
  if (!me) {
    if (lastPhaseRendered !== "signup") {
      lastPhaseRendered = "signup";
      container.innerHTML = `
        <div class="section-title">Choisis ton animal fétiche</div>
        <div class="animal-grid" id="animal-grid"></div>
        <input class="player-name" id="player-name" placeholder="Ton prénom (optionnel)" maxlength="20">
        <button class="btn btn-primary" id="join-btn" disabled style="width:100%;margin-top:14px">Rejoindre la partie</button>
      `;
      const grid = document.getElementById("animal-grid");
      ANIMAUX.forEach(a => {
        const el = document.createElement("div"); el.className = "animal";
        el.dataset.animal = a.e;
        el.innerHTML = `<span class="emoji">${a.e}</span><div class="name">${a.n}</div>`;
        if (taken.has(a.e)) el.classList.add("taken");
        el.addEventListener("click", () => {
          if (el.classList.contains("taken")) return;
          grid.querySelectorAll(".animal").forEach(x => x.classList.remove("sel"));
          el.classList.add("sel");
          mySelectedAnimal = a.e;
          document.getElementById("join-btn").disabled = false;
        });
        grid.appendChild(el);
      });
      document.getElementById("join-btn").addEventListener("click", async () => {
        // Re-check côté Firebase au moment du clic : éviter conflit si 2 joueurs sélectionnent en même temps
        const fresh = await fbGet(`${BASE}/players`) || {};
        const stillFree = !Object.values(fresh).some(p => p && p.animal === mySelectedAnimal);
        if (!stillFree) {
          alert("Cet animal vient d'être pris par un autre joueur — choisis-en un autre !");
          mySelectedAnimal = null;
          lastPhaseRendered = ""; // re-render
          return;
        }
        const name = document.getElementById("player-name").value.trim() || mySelectedAnimal + " mystère";
        await fbPut(`${BASE}/players/${PLAYER_ID}`, {
          animal: mySelectedAnimal, name, joined_at: Date.now()
        });
        myAnimal = mySelectedAnimal; myName = name;
        lastPhaseRendered = "";
      });
    } else {
      // Rafraîchir l'état "pris" en live sans casser la sélection en cours
      const grid = document.getElementById("animal-grid");
      if (grid) {
        grid.querySelectorAll(".animal").forEach(el => {
          const a = el.dataset.animal;
          const isTaken = taken.has(a);
          el.classList.toggle("taken", isTaken);
        });
      }
    }
    return;
  }
  myAnimal = me.animal; myName = me.name;

  // 2) Selon state phase
  if (state.phase === "lobby") {
    if (lastPhaseRendered !== "lobby") {
      lastPhaseRendered = "lobby";
      container.innerHTML = `
        <div class="waiting">
          <span class="big">${myAnimal}</span>
          <h2>Bien vu, ${escapeHtml(myName)} !</h2>
          <p>Le quiz va commencer dans quelques instants.<br>Reste sur cet écran 👀</p>
        </div>`;
    }
    return;
  }

  if (state.phase === "question") {
    const q = QUESTIONS[state.q_idx];
    const myAnswer = ((all.answers || {})[`q${state.q_idx}`] || {})[PLAYER_ID];
    const elapsed = Date.now() - state.q_started_at;
    const remaining = Math.max(0, QUESTION_DURATION - elapsed);

    if (myAnswer !== undefined) {
      // Déjà répondu : affichage attente
      if (lastPhaseRendered !== `answered-${state.q_idx}`) {
        lastPhaseRendered = `answered-${state.q_idx}`;
        container.innerHTML = `
          <div class="answer-feedback">
            <span class="verdict">⏳</span>
            <h3>Réponse envoyée</h3>
            <div class="info">On attend les autres…</div>
          </div>`;
      }
      return;
    }

    if (lastPhaseRendered !== `q-${state.q_idx}`) {
      lastPhaseRendered = `q-${state.q_idx}`;
      container.innerHTML = `
        <div class="q-card">
          <div class="q-idx">Question ${state.q_idx + 1} / ${QUESTIONS.length}</div>
          <div class="q-text">${escapeHtml(q.q)}</div>
          <div class="chrono"><div class="chrono-fill" id="play-chrono"></div></div>
        </div>
        <div class="choices" id="play-choices"></div>
      `;
      const choicesDiv = document.getElementById("play-choices");
      q.opts.forEach((opt, i) => {
        const el = document.createElement("div"); el.className = "choice";
        el.textContent = opt;
        el.addEventListener("click", async () => {
          choicesDiv.querySelectorAll(".choice").forEach(x => { x.classList.add("locked"); });
          el.classList.add("picked");
          const t = Date.now() - state.q_started_at;
          await fbPut(`${BASE}/answers/q${state.q_idx}/${PLAYER_ID}`, {
            answer: i, time_ms: t, animal: myAnimal, name: myName
          });
        });
        choicesDiv.appendChild(el);
      });
      if (chronoTimer) clearInterval(chronoTimer);
      chronoTimer = setInterval(() => {
        const e = Date.now() - state.q_started_at;
        const pct = Math.max(0, 100 - e / QUESTION_DURATION * 100);
        const cf = document.getElementById("play-chrono");
        if (cf) cf.style.width = pct + "%";
      }, 100);
    }
    return;
  }

  if (state.phase === "result") {
    const q = QUESTIONS[state.q_idx];
    const myAns = ((all.answers || {})[`q${state.q_idx}`] || {})[PLAYER_ID];
    const wasCorrect = myAns && myAns.answer === q.correct;
    const myScore = myAns ? computeScore(wasCorrect, myAns.time_ms) : 0;
    const rendered = `result-${state.q_idx}`;
    if (lastPhaseRendered !== rendered) {
      lastPhaseRendered = rendered;
      container.innerHTML = `
        <div class="answer-feedback">
          <span class="verdict">${wasCorrect ? "✅" : "❌"}</span>
          <h3>${wasCorrect ? "Bien joué !" : "Pas cette fois…"}</h3>
          <div class="info">Bonne réponse : <b style="color:var(--green)">${escapeHtml(q.opts[q.correct])}</b></div>
          <div class="score-line">+${myScore} pts</div>
          <div class="info" style="font-style:italic">${escapeHtml(q.hint || "")}</div>
        </div>`;
    }
    return;
  }

  if (state.phase === "end") {
    if (lastPhaseRendered !== "end") {
      lastPhaseRendered = "end";
      const scores = computeAllScores(all);
      const myEntry = scores.find(s => s.id === PLAYER_ID);
      const rank = scores.findIndex(s => s.id === PLAYER_ID) + 1;
      container.innerHTML = `
        <div class="answer-feedback">
          <span class="verdict">🎉</span>
          <h3>Bravo ${escapeHtml(myName)} !</h3>
          <div class="score-line">${myEntry ? myEntry.score : 0} pts</div>
          <div class="info">Tu termines <b>${rank}<sup>${rank === 1 ? "er" : "e"}</sup></b> sur ${scores.length}.</div>
          <div class="info" style="margin-top:14px;color:var(--orange);font-weight:700">Regarde la projection pour le podium final !</div>
        </div>`;
    }
    return;
  }
}

// ============================================================
// PROJECTION
// ============================================================
async function initProjection() {
  const playUrl = location.origin + location.pathname + "?play=1";
  document.getElementById("proj-url").textContent = playUrl;
  loadQR("proj-qr", playUrl);
  setInterval(renderProj, 1000);
  renderProj();
}

let projLastRender = "";

async function renderProj() {
  const all = await fbGet(BASE) || {};
  const players = all.players || {};
  const state = all.state || { phase: "lobby" };
  const answers = all.answers || {};
  const container = document.getElementById("proj-content");
  const pcount = Object.keys(players).length;
  const ansCount = state.phase === "question"
    ? Object.keys(answers[`q${state.q_idx}`] || {}).length
    : 0;

  // Barre de contrôle Séverine + countdown sonore + auto-close
  renderControlBar(state, pcount, ansCount);
  tickQuestionSounds(state);

  if (state.phase === "lobby") {
    const sig = `lobby-${pcount}`;
    if (projLastRender === sig) return;
    projLastRender = sig;
    container.innerHTML = `
      <div class="proj-lobby-center">
        <div class="pcount">${pcount}</div>
        <div class="plabel">${pcount > 1 ? "joueurs connectés" : "joueur connecté"}</div>
        <h2 style="margin-top:30px;font-size:36px">Scannez le QR pour rejoindre 👉</h2>
      </div>
      <div class="proj-animals">
        ${Object.values(players).map(p => `
          <div class="anim-chip"><span class="e">${p.animal}</span> ${escapeHtml(p.name || "")}</div>
        `).join("")}
      </div>`;
    return;
  }

  if (state.phase === "question") {
    const q = QUESTIONS[state.q_idx];
    const ansAll = ((all.answers || {})[`q${state.q_idx}`]) || {};
    const elapsed = Date.now() - state.q_started_at;
    const remaining = Math.max(0, QUESTION_DURATION - elapsed);
    const pct = Math.max(0, 100 - elapsed / QUESTION_DURATION * 100);
    const ansCount = Object.keys(ansAll).length;

    // Render full only on phase/question change
    const sig = `q-${state.q_idx}`;
    if (projLastRender !== sig) {
      projLastRender = sig;
      container.innerHTML = `
        <div class="proj-q">
          <div class="qnum">QUESTION ${state.q_idx + 1} / ${QUESTIONS.length}</div>
          <div class="qtxt">${escapeHtml(q.q)}</div>
          <div class="qchoices">
            ${q.opts.map((o, i) => `
              <div class="qch"><span class="letter">${["A","B","C","D"][i]}</span>${escapeHtml(o)}</div>
            `).join("")}
          </div>
          <div class="chrono-bar"><div class="chrono-fill" id="proj-chrono"></div></div>
          <div class="stats">
            <span id="proj-stat-ans">${ansCount} / ${pcount} ont répondu</span>
            <span id="proj-stat-time">⏱ ${Math.ceil(remaining/1000)}s</span>
          </div>
        </div>`;
    } else {
      // Update only chrono and stats
      const cf = document.getElementById("proj-chrono");
      if (cf) cf.style.width = pct + "%";
      document.getElementById("proj-stat-ans").textContent = `${ansCount} / ${pcount} ont répondu`;
      document.getElementById("proj-stat-time").textContent = `⏱ ${Math.ceil(remaining/1000)}s`;
    }
    return;
  }

  if (state.phase === "result") {
    const sig = `result-${state.q_idx}`;
    if (projLastRender === sig) return;
    projLastRender = sig;
    playApplause();
    lastBeepSec = -1; // reset pour la prochaine question

    const q = QUESTIONS[state.q_idx];
    const ansAll = ((all.answers || {})[`q${state.q_idx}`]) || {};

    // Top 3 de la question
    const qScores = [];
    Object.entries(ansAll).forEach(([pid, ans]) => {
      const correct = ans.answer === q.correct;
      const pts = computeScore(correct, ans.time_ms);
      if (correct) qScores.push({ id: pid, animal: ans.animal, name: ans.name, score: pts });
    });
    const top3Q = topN(qScores, 3);

    // Top 3 global cumulé
    const allScores = computeAllScores(all);
    const top3G = topN(allScores, 3);

    const top3QHtml = top3Q.length === 0
      ? `<div style="text-align:center;padding:30px 20px;background:#fff;border-radius:16px;border:2px dashed var(--orange);margin:14px 0">
           <div style="font-size:42px;margin-bottom:6px">🙈</div>
           <div style="color:var(--navy);font-family:'Playfair Display',serif;font-style:italic;font-size:22px;margin-bottom:4px">Personne n'a trouvé !</div>
           <div style="color:var(--grey);font-size:14px">${Object.keys(ansAll).length} réponse${Object.keys(ansAll).length>1?'s':''} reçue${Object.keys(ansAll).length>1?'s':''}, mais aucune juste.</div>
         </div>`
      : renderPodium(top3Q);

    // Stats par réponse : combien ont voté pour chaque choix
    const counts = [0,0,0,0];
    Object.values(ansAll).forEach(a => { if (a.answer >= 0 && a.answer < 4) counts[a.answer]++; });
    const totalAns = counts.reduce((s,c) => s+c, 0);
    const maxC = Math.max(1, ...counts);
    const letters = ["A","B","C","D"];
    const choicesHtml = q.opts.map((opt, i) => {
      const c = counts[i];
      const pct = totalAns > 0 ? Math.round(c / totalAns * 100) : 0;
      const isCorrect = i === q.correct;
      return `
        <div class="ans-row ${isCorrect ? 'correct' : ''}">
          <div class="ans-letter">${letters[i]}${isCorrect ? '<span class="ans-check">✓</span>' : ''}</div>
          <div class="ans-content">
            <div class="ans-text">${escapeHtml(opt)}</div>
            <div class="ans-bar-wrap">
              <div class="ans-bar" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="ans-stat"><b>${c}</b><span>vote${c>1?'s':''} · ${pct}%</span></div>
        </div>`;
    }).join("");

    container.innerHTML = `
      <div class="podium-section">
        <h2>Réponse : <span class="accent">${escapeHtml(q.opts[q.correct])}</span></h2>
        <div class="answers-stats">
          ${choicesHtml}
        </div>
      </div>
      <div class="results-2col">
        <div>
          <div class="podium-section" style="margin-top:0">
            <h2 style="font-size:26px">🏆 Top 3 de la question</h2>
            ${top3QHtml}
          </div>
        </div>
        <div>
          <div class="podium-section" style="margin-top:0">
            <h2 style="font-size:26px">⭐ Top 3 général</h2>
            ${renderPodium(top3G)}
          </div>
        </div>
      </div>`;
    return;
  }

  if (state.phase === "end") {
    if (projLastRender === "end") return;
    projLastRender = "end";
    // Double salve d'applaudissements pour le final
    playApplause();
    setTimeout(playApplause, 3500);
    const allScores = computeAllScores(all);
    const top3 = topN(allScores, 3);
    container.innerHTML = `
      <div class="end-screen">
        <h1>🎉 Bravo !</h1>
        <p>Voici le podium final de cet atelier MEDEF</p>
      </div>
      <div class="podium-section">
        ${renderPodium(top3)}
      </div>
      <div class="end-screen" style="padding-top:30px">
        <p style="color:var(--grey-l);font-style:italic;font-size:18px">Merci à toutes et tous · OPTA-S × MEDEF Réunion</p>
      </div>`;
  }
}

function renderPodium(top3) {
  const slots = [top3[1], top3[0], top3[2]]; // 2e à gauche, 1er au centre, 3e à droite
  const heights = ["silver", "gold", "bronze"];
  const ranks = ["2", "1", "3"];
  return `
    <div class="podium">
      ${slots.map((p, i) => {
        if (!p) return `<div class="pod-step pod-empty" style="height:${i===1?170:i===0?130:100}px">—</div>`;
        return `
          <div class="pod-step ${heights[i]}">
            <div class="rank">${ranks[i]}</div>
            <div class="anim">${p.animal || "🎯"}</div>
            <div class="name">${escapeHtml(p.name || "")}</div>
            <div class="pts">${p.score} pts</div>
          </div>`;
      }).join("")}
    </div>`;
}

function computeAllScores(all) {
  const players = all.players || {};
  const answers = all.answers || {};
  const scores = {};
  Object.entries(players).forEach(([pid, p]) => {
    scores[pid] = { id: pid, animal: p.animal, name: p.name, score: 0 };
  });
  Object.entries(answers).forEach(([qkey, qans]) => {
    const qIdx = parseInt(qkey.replace("q",""), 10);
    const q = QUESTIONS[qIdx];
    if (!q) return;
    Object.entries(qans).forEach(([pid, ans]) => {
      const correct = ans.answer === q.correct;
      const pts = computeScore(correct, ans.time_ms);
      if (scores[pid]) scores[pid].score += pts;
      else scores[pid] = { id: pid, animal: ans.animal, name: ans.name, score: pts };
    });
  });
  return Object.values(scores);
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
